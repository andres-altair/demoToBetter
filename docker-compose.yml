# version: "3.9"

services:
  app:
    image: demotobetter
    build: .
    ports:
      - "8080:8080"
    secrets:
      - pg_url
      - pg_user
      - pg_password
      - jwt_secret

    logging:
      driver: fluentd
      options:
        fluentd-address: localhost:24224
        tag: spring.logs
    depends_on:
      - fluentbit
      - postgres

  postgres:
    image: postgres:16
    secrets:
      - pg_user
      - pg_password
      - pg_db
    environment:
      POSTGRES_USER_FILE: /run/secrets/pg_user
      POSTGRES_PASSWORD_FILE: /run/secrets/pg_password
      POSTGRES_DB_FILE: /run/secrets/pg_db
    ports:
      - target: 5432
        published: 5435
        protocol: tcp
        mode: ingress

  fluentbit:
    image: fluent/fluent-bit:2.1
    volumes:
      - ./fluentbit/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf
    ports:
      - "24224:24224"
      - "24224:24224/udp"
    depends_on:
      - elasticsearch

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"

  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.0
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch

secrets:
  pg_url:
    external: true
  pg_user:
    external: true
  pg_password:
    external: true
  jwt_secret:
    external: true
  pg_db:
    external: true

